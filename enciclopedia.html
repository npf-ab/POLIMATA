<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Enciclopedia del Conocimiento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #12141c;
    --surface: #181c27;
    --surface-2: #1f2430;
    --rule: #333850;
    --rule-soft: #262b3a;
    --ink: #e9e7df;
    --ink-dim: #9498ab;
    --ink-faint: #656a7d;
    --gold: #c9a24c;
    --gold-soft: #8a763f;
    --sage: #7fae8f;
    --sage-dim: #3c5246;
    --danger: #b56a5c;
    --radius: 3px;
    --serif: 'Spectral', Georgia, serif;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: 'IBM Plex Mono', ui-monospace, monospace;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(201,162,76,0.06), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 100%, rgba(127,174,143,0.05), transparent 60%);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }
  ::selection{ background: var(--gold-soft); color:#fff; }
  button{font-family:inherit;}
  input{font-family:inherit;}

  /* focus visibility */
  a:focus-visible, button:focus-visible, input:focus-visible, [tabindex]:focus-visible{
    outline: 2px solid var(--gold); outline-offset: 2px;
  }

  .app{ display:flex; min-height:100vh; }

  /* ---------- LEFT RAIL ---------- */
  .rail{
    width: 210px;
    flex: none;
    border-right: 1px solid var(--rule-soft);
    background: linear-gradient(180deg, var(--surface), var(--bg) 85%);
    padding: 22px 0 22px;
    display:flex;
    flex-direction:column;
    position: sticky;
    top:0;
    height:100vh;
    overflow-y:auto;
  }
  .rail-brand{
    padding: 0 20px 18px;
    border-bottom: 1px solid var(--rule-soft);
    margin-bottom: 6px;
  }
  .rail-brand .eyebrow{
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--gold);
    text-transform: uppercase;
  }
  .rail-brand h1{
    font-family: var(--serif);
    font-size: 19px;
    font-weight: 600;
    margin: 4px 0 0;
    line-height:1.2;
  }
  .rail-nav{ display:flex; flex-direction:column; padding: 8px 10px; gap:1px; }
  .rail-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding: 8px 10px;
    border-radius: var(--radius);
    cursor:pointer;
    background: transparent;
    border: 1px solid transparent;
    text-align:left;
    color: var(--ink-dim);
    position:relative;
    overflow:hidden;
  }
  .rail-item:hover{ background: var(--surface-2); color: var(--ink); }
  .rail-item.active{
    background: var(--surface-2);
    border-color: var(--rule);
    color: var(--ink);
  }
  .rail-item.active::before{
    content:"";
    position:absolute; left:0; top:0; bottom:0; width:2px;
    background: var(--gold);
  }
  .rail-numeral{
    font-family: var(--mono);
    font-size: 11px;
    color: var(--gold-soft);
    width: 22px;
    flex:none;
    text-align:right;
  }
  .rail-item.active .rail-numeral{ color: var(--gold); }
  .rail-icon{ flex:none; font-size:14px; opacity:0.9; }
  .rail-label{
    font-size: 12.5px;
    flex:1;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .rail-pct{
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-faint);
    flex:none;
  }
  .rail-item.active .rail-pct{ color: var(--sage); }
  .rail-track{
    height: 2px;
    background: var(--rule-soft);
    margin: 2px 10px 8px;
    border-radius: 2px;
    overflow:hidden;
  }
  .rail-track > div{ height:100%; background: var(--sage); }

  .rail-foot{
    margin-top:auto;
    padding: 14px 20px 0;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-faint);
    border-top: 1px solid var(--rule-soft);
  }

  /* ---------- MAIN ---------- */
  .main{ flex:1; min-width:0; }
  .view{ max-width: 900px; margin: 0 auto; padding: 48px 40px 90px; }

  /* Overview */
  .ov-hero .eyebrow{
    font-family: var(--mono); font-size:11px; letter-spacing:.18em; color:var(--gold); text-transform:uppercase;
  }
  .ov-hero h2{
    font-family: var(--serif);
    font-size: 40px;
    font-weight:600;
    margin: 10px 0 8px;
    line-height:1.1;
  }
  .ov-hero p{
    color: var(--ink-dim);
    font-size: 14.5px;
    max-width: 560px;
    line-height:1.6;
    margin: 0 0 30px;
  }
  .ov-stats{
    display:flex; gap:36px; margin-bottom: 40px; flex-wrap:wrap;
  }
  .ov-stat .num{
    font-family: var(--mono); font-size: 26px; color: var(--ink); font-weight:600;
  }
  .ov-stat .lbl{
    font-size: 11px; color: var(--ink-faint); text-transform:uppercase; letter-spacing:.08em; margin-top:2px;
  }

  .shelf-wrap{
    background: var(--surface);
    border: 1px solid var(--rule-soft);
    border-radius: 6px;
    padding: 28px 28px 18px;
  }
  .shelf-label{
    font-family: var(--mono); font-size:10px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:.1em; margin-bottom:16px;
  }
  .shelf{
    display:flex;
    align-items:flex-end;
    gap: 10px;
    height: 190px;
    border-bottom: 2px solid var(--rule);
    padding-bottom: 0;
  }
  .spine{
    flex:1;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    align-items:center;
    cursor:pointer;
    position:relative;
  }
  .spine-fill{
    width: 100%;
    max-width: 46px;
    border-radius: 3px 3px 0 0;
    background: linear-gradient(180deg, var(--gold), var(--sage-dim) 130%);
    transition: height .4s ease;
    min-height: 4px;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.15);
  }
  .spine:hover .spine-fill{ filter: brightness(1.18); }
  .spine-track{
    width:100%; max-width:46px; flex:1; display:flex; align-items:flex-end;
    background: var(--rule-soft);
    border-radius: 3px 3px 0 0;
  }
  .spine-numeral{
    font-family: var(--mono); font-size: 10px; color: var(--ink-faint); margin-top:8px;
  }
  .spine:hover .spine-numeral{ color: var(--gold); }
  .spine-tip{
    position:absolute; bottom: calc(100% + 6px);
    background: var(--surface-2); border:1px solid var(--rule);
    padding: 5px 9px; border-radius:3px; font-size:11px; white-space:nowrap;
    opacity:0; pointer-events:none; transition:opacity .15s ease;
    z-index:5;
  }
  .spine:hover .spine-tip{ opacity:1; }

  .ov-grid{
    margin-top: 34px;
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(250px,1fr));
    gap: 12px;
  }
  .ov-card{
    background: var(--surface);
    border:1px solid var(--rule-soft);
    border-radius: 5px;
    padding: 14px 16px;
    cursor:pointer;
    transition: border-color .15s ease, transform .15s ease;
  }
  .ov-card:hover{ border-color: var(--gold-soft); transform: translateY(-1px); }
  .ov-card-top{ display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .ov-card-roman{ font-family: var(--mono); font-size:11px; color: var(--gold); }
  .ov-card-title{ font-size:13.5px; font-weight:600; flex:1; }
  .ov-card-icon{ font-size:15px; }
  .ov-bar{ height:3px; background:var(--rule-soft); border-radius:2px; overflow:hidden; margin-bottom:6px;}
  .ov-bar>div{ height:100%; background:var(--sage); }
  .ov-card-meta{ font-family:var(--mono); font-size:10.5px; color:var(--ink-faint); }

  /* Discipline view */
  .disc-header{ margin-bottom: 22px; }
  .disc-eyebrow{
    font-family: var(--mono); font-size: 11px; color: var(--gold-soft); letter-spacing:.1em;
    display:flex; align-items:center; gap:8px; margin-bottom: 6px;
  }
  .disc-back{
    background:none; border:none; color: var(--ink-faint); cursor:pointer; font-size:11px;
    font-family: var(--mono); padding:0; text-decoration:none;
  }
  .disc-back:hover{ color: var(--gold); }
  .disc-title-row{ display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; }
  .disc-roman{ font-family: var(--serif); font-size: 34px; color: var(--gold); font-weight:600; }
  .disc-title-row h2{ font-family: var(--serif); font-size:30px; font-weight:600; margin:0; }
  .disc-sub{ color: var(--ink-faint); font-size:12.5px; margin-top:6px; font-family: var(--mono); }

  .disc-progress-row{
    display:flex; align-items:center; gap:14px; margin: 16px 0 6px;
  }
  .disc-bar{ flex:1; height:6px; background: var(--rule-soft); border-radius:3px; overflow:hidden; }
  .disc-bar > div{ height:100%; background: linear-gradient(90deg, var(--sage-dim), var(--sage)); transition: width .3s ease;}
  .disc-pct{ font-family: var(--mono); font-size:13px; color: var(--sage); flex:none; min-width:70px; text-align:right;}

  .toolbar{
    display:flex; gap:10px; margin: 22px 0 18px; align-items:center;
  }
  .search{
    flex:1;
    background: var(--surface);
    border:1px solid var(--rule-soft);
    border-radius:4px;
    padding: 9px 12px;
    color: var(--ink);
    font-size:13px;
  }
  .search::placeholder{ color: var(--ink-faint); }
  .search:focus{ border-color: var(--gold-soft); }
  .ghost-btn{
    background:none; border:1px solid var(--rule-soft); color: var(--ink-dim);
    padding: 8px 12px; border-radius:4px; font-size:12px; cursor:pointer; white-space:nowrap;
  }
  .ghost-btn:hover{ border-color: var(--danger); color: var(--danger); }

  .topic{
    border-bottom: 1px solid var(--rule-soft);
  }
  .topic-row{
    display:flex; align-items:center; gap:12px;
    padding: 13px 4px;
    cursor:pointer;
  }
  .topic-row:hover .topic-title{ color: var(--gold); }
  .topic-chevron{
    flex:none; width:14px; color: var(--ink-faint); transition: transform .18s ease;
    font-size:11px;
  }
  .topic.open .topic-chevron{ transform: rotate(90deg); color: var(--gold); }
  .topic-title{
    flex:1; font-size:14.5px; font-weight:500; transition:color .15s ease;
  }
  .topic-title .topic-num{ color: var(--gold-soft); font-family:var(--mono); font-size:12px; margin-right:8px; }
  .topic-frac{
    font-family: var(--mono); font-size:11.5px; color: var(--ink-faint); flex:none;
  }
  .topic-frac.done{ color: var(--sage); }
  .topic-del{
    flex:none; background:none; border:none; color: var(--ink-faint); cursor:pointer; font-size:13px;
    opacity:0; padding:2px 4px;
  }
  .topic-row:hover .topic-del{ opacity:1; }
  .topic-del:hover{ color: var(--danger); }

  .topic-body{ display:none; padding: 2px 4px 18px 26px; }
  .topic.open .topic-body{ display:block; }

  .sub-row{
    display:flex; align-items:flex-start; gap:10px; padding: 6px 4px; border-radius:3px;
  }
  .sub-row:hover{ background: var(--surface); }
  .sub-check{
    flex:none; width:16px; height:16px; margin-top:2px;
    border: 1px solid var(--rule);
    border-radius: 3px;
    background: transparent;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    color: var(--bg);
    font-size: 11px;
  }
  .sub-check.checked{ background: var(--sage); border-color: var(--sage); color: var(--bg); }
  .sub-text{
    flex:1; font-size:13.5px; line-height:1.5; padding: 1px 2px; border-radius:3px;
    cursor:text; outline:none;
  }
  .sub-text.checked{ color: var(--ink-faint); text-decoration: line-through; text-decoration-color: var(--rule); }
  .sub-text:focus{ background: var(--surface-2); }
  .sub-del{
    flex:none; background:none; border:none; color: var(--ink-faint); cursor:pointer; font-size:12.5px;
    opacity:0; padding:2px 6px;
  }
  .sub-row:hover .sub-del{ opacity:1; }
  .sub-del:hover{ color: var(--danger); }

  .add-row{
    display:flex; align-items:center; gap:10px; padding: 8px 4px 4px 4px; margin-top:4px;
  }
  .add-row input{
    flex:1; background:transparent; border:none; border-bottom:1px dashed var(--rule);
    color: var(--ink-dim); font-size:13px; padding: 4px 2px;
  }
  .add-row input:focus{ color:var(--ink); border-bottom-color: var(--gold-soft); }
  .add-row input::placeholder{ color: var(--ink-faint); }
  .add-sign{ color: var(--gold-soft); font-size:14px; flex:none; }

  .add-topic-row{
    margin-top: 18px;
  }
  .add-topic-row input{
    width:100%;
    background: var(--surface);
    border: 1px dashed var(--rule);
    border-radius:4px;
    padding: 11px 14px;
    color: var(--ink-dim);
    font-size: 13.5px;
  }
  .add-topic-row input:focus{ border-color: var(--gold-soft); color:var(--ink); border-style: solid;}

  .empty-note{ color: var(--ink-faint); font-size:12.5px; padding: 10px 4px 4px; font-style:italic; }

  @media (max-width: 760px){
    .app{ flex-direction:column; }
    .rail{ width:100%; height:auto; position:relative; flex-direction:row; overflow-x:auto; padding:14px 0; }
    .rail-brand{ display:none; }
    .rail-nav{ flex-direction:row; padding: 0 12px; }
    .rail-item{ flex-direction:column; gap:4px; min-width:64px; align-items:center; }
    .rail-track{ display:none; }
    .rail-label{ font-size:10px; white-space:normal; text-align:center; }
    .rail-numeral{ width:auto; text-align:center; }
    .rail-foot{ display:none; }
    .view{ padding: 28px 18px 70px; }
    .disc-roman{ font-size:26px; }
    .disc-title-row h2{ font-size:23px; }
  }
</style>
</head>
<body>
<div class="app">
  <nav class="rail">
    <div class="rail-brand">
      <div class="eyebrow">Autodidacta</div>
      <h1>Enciclopedia del<br/>Conocimiento</h1>
    </div>
    <div class="rail-nav" id="railNav"></div>
    <div class="rail-foot">Tu progreso se guarda solo<br/>en tu cuenta.</div>
  </nav>
  <main class="main">
    <div class="view" id="view"></div>
  </main>
</div>

const state = {
  current: 'overview',   // 'overview' | discipline id
  data: {},              // id -> { topics: [...] } working copy with done flags
  loaded: {},            // id -> bool
  search: '',
  openTopics: {},        // topicId -> bool
};

function uid(prefix){
  return prefix + '-' + Math.random().toString(36).slice(2,9);
}

function cloneDefault(disc){
  return {
    topics: disc.topics.map(t => ({
      id: t.id,
      title: t.title,
      subs: t.subs.map(s => ({ id: s.id, text: s.text, done:false }))
    }))
  };
}

async function loadDiscipline(id){
  if(state.loaded[id]) return;
  const disc = DEFAULT_DATA.find(d=>d.id===id);
  try{
    const res = await window.storage.get('disc-state:'+id, false);
    if(res && res.value){
      state.data[id] = JSON.parse(res.value);
    } else {
      state.data[id] = cloneDefault(disc);
    }
  }catch(e){
    state.data[id] = cloneDefault(disc);
  }
  state.loaded[id] = true;
}

let saveTimers = {};
function scheduleSave(id){
  clearTimeout(saveTimers[id]);
  saveTimers[id] = setTimeout(()=>persist(id), 350);
}
async function persist(id){
  try{
    await window.storage.set('disc-state:'+id, JSON.stringify(state.data[id]), false);
  }catch(e){
    console.error('No se pudo guardar el progreso', e);
  }
}

function countProgress(discState){
  let done=0, total=0;
  discState.topics.forEach(t=>{
    t.subs.forEach(s=>{ total++; if(s.done) done++; });
  });
  return {done, total};
}

async function ensureAllLoadedForOverview(){
  await Promise.all(DEFAULT_DATA.map(d=>loadDiscipline(d.id)));
}

function renderRail(){
  const nav = document.getElementById('railNav');
  let html = `<div class="rail-item ${state.current==='overview'?'active':''}" data-nav="overview">
      <span class="rail-numeral">◈</span><span class="rail-icon"></span>
      <span class="rail-label">Panorama</span>
    </div>`;
  DEFAULT_DATA.forEach(d=>{
    const loaded = state.loaded[d.id];
    let pct = 0;
    if(loaded){
      const {done,total} = countProgress(state.data[d.id]);
      pct = total? Math.round(done/total*100) : 0;
    }
    html += `
      <div class="rail-item ${state.current===d.id?'active':''}" data-nav="${d.id}">
        <span class="rail-numeral">${d.roman}</span>
        <span class="rail-icon">${d.icon}</span>
        <span class="rail-label">${d.title}</span>
        <span class="rail-pct">${loaded? pct+'%':''}</span>
      </div>
      <div class="rail-track"><div style="width:${pct}%"></div></div>
    `;
  });
  nav.innerHTML = html;
  nav.querySelectorAll('[data-nav]').forEach(el=>{
    el.addEventListener('click', ()=> navigate(el.dataset.nav));
  });
}

async function navigate(target){
  state.current = target;
  state.search='';
  if(target!=='overview'){ await loadDiscipline(target); }
  renderRail();
  render();
  window.scrollTo(0,0);
}

async function render(){
  const view = document.getElementById('view');
  if(state.current==='overview'){
    await ensureAllLoadedForOverview();
    renderRail();
    view.innerHTML = renderOverview();
    attachOverviewEvents();
  } else {
    view.innerHTML = renderDiscipline(state.current);
    attachDisciplineEvents(state.current);
  }
}

function renderOverview(){
  let totalDone=0, totalAll=0;
  const cards = DEFAULT_DATA.map(d=>{
    const {done,total} = countProgress(state.data[d.id]);
    totalDone+=done; totalAll+=total;
    const pct = total? Math.round(done/total*100):0;
    return {d, done, total, pct};
  });
  const overallPct = totalAll? Math.round(totalDone/totalAll*100):0;

  const shelf = cards.map(c=>`
    <div class="spine" data-nav="${c.d.id}">
      <div class="spine-tip">${c.d.title} · ${c.pct}%</div>
      <div class="spine-track">
        <div class="spine-fill" style="height:${Math.max(c.pct,2)}%"></div>
      </div>
      <div class="spine-numeral">${c.d.roman}</div>
    </div>
  `).join('');

  const grid = cards.map(c=>`
    <div class="ov-card" data-nav="${c.d.id}">
      <div class="ov-card-top">
        <span class="ov-card-roman">${c.d.roman}</span>
        <span class="ov-card-icon">${c.d.icon}</span>
        <span class="ov-card-title">${c.d.title}</span>
      </div>
      <div class="ov-bar"><div style="width:${c.pct}%"></div></div>
      <div class="ov-card-meta">${c.done} / ${c.total} subtemas · ${c.pct}%</div>
    </div>
  `).join('');

  return `
    <div class="ov-hero">
      <div class="eyebrow">Doce disciplinas · un solo mapa</div>
      <h2>Panorama de tu formación</h2>
      <p>Cada disciplina es un estante. La altura de cada lomo muestra cuánto has dominado. Entra a cualquiera para marcar lo aprendido, editar los subtemas sugeridos o añadir los tuyos.</p>
      <div class="ov-stats">
        <div class="ov-stat"><div class="num">${totalDone} / ${totalAll}</div><div class="lbl">Subtemas dominados</div></div>
        <div class="ov-stat"><div class="num">${overallPct}%</div><div class="lbl">Progreso total</div></div>
        <div class="ov-stat"><div class="num">${DEFAULT_DATA.length}</div><div class="lbl">Disciplinas</div></div>
      </div>
    </div>
    <div class="shelf-wrap">
      <div class="shelf-label">Tu estante de conocimiento</div>
      <div class="shelf">${shelf}</div>
    </div>
    <div class="ov-grid">${grid}</div>
  `;
}

function attachOverviewEvents(){
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.addEventListener('click', ()=> navigate(el.dataset.nav));
  });
}

function matchesSearch(text){
  if(!state.search) return true;
  return text.toLowerCase().includes(state.search.toLowerCase());
}

function renderDiscipline(id){
  const meta = DEFAULT_DATA.find(d=>d.id===id);
  const st = state.data[id];
  const {done,total} = countProgress(st);
  const pct = total? Math.round(done/total*100):0;

  const q = state.search.trim().toLowerCase();

  const topicsHtml = st.topics.map(t=>{
    const tDone = t.subs.filter(s=>s.done).length;
    const tTotal = t.subs.length;
    const isOpen = !!state.openTopics[t.id] || (q && (t.title.toLowerCase().includes(q) || t.subs.some(s=>s.text.toLowerCase().includes(q))));

    const subsHtml = t.subs
      .filter(s=> !q || s.text.toLowerCase().includes(q) || t.title.toLowerCase().includes(q))
      .map(s=>`
        <div class="sub-row" data-sub="${s.id}">
          <button class="sub-check ${s.done?'checked':''}" data-check="${s.id}" aria-label="Marcar como dominado">${s.done?'✓':''}</button>
          <div class="sub-text ${s.done?'checked':''}" data-text="${s.id}" contenteditable="true" spellcheck="false">${escapeHtml(s.text)}</div>
          <button class="sub-del" data-subdel="${s.id}" aria-label="Eliminar subtema">✕</button>
        </div>
      `).join('') || `<div class="empty-note">Sin subtemas que coincidan con la búsqueda.</div>`;

    return `
      <div class="topic ${isOpen?'open':''}" data-topic="${t.id}">
        <div class="topic-row" data-toggle="${t.id}">
          <span class="topic-chevron">▶</span>
          <div class="topic-title" data-topictext="${t.id}" contenteditable="true" spellcheck="false">${escapeHtml(t.title)}</div>
          <span class="topic-frac ${tTotal&&tDone===tTotal?'done':''}">${tDone}/${tTotal}</span>
          <button class="topic-del" data-topicdel="${t.id}" aria-label="Eliminar tema">✕</button>
        </div>
        <div class="topic-body">
          ${subsHtml}
          <div class="add-row">
            <span class="add-sign">+</span>
            <input type="text" placeholder="Añadir subtema y presionar Enter" data-addsub="${t.id}" />
          </div>
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="disc-header">
      <div class="disc-eyebrow">
        <button class="disc-back" data-nav="overview">← Panorama</button>
      </div>
      <div class="disc-title-row">
        <span class="disc-roman">${meta.roman}</span>
        <h2>${meta.icon} ${meta.title}</h2>
      </div>
      <div class="disc-sub">${st.topics.length} temas · ${total} subtemas</div>
      <div class="disc-progress-row">
        <div class="disc-bar"><div style="width:${pct}%"></div></div>
        <div class="disc-pct">${done}/${total} · ${pct}%</div>
      </div>
    </div>

    <div class="toolbar">
      <input class="search" id="searchInput" type="text" placeholder="Buscar tema o subtema en ${meta.title}…" value="${escapeAttr(state.search)}" />
      <button class="ghost-btn" id="resetBtn">Restaurar predeterminados</button>
    </div>

    <div id="topicsWrap">${topicsHtml}</div>

    <div class="add-topic-row">
      <input type="text" id="addTopicInput" placeholder="+ Añadir un nuevo tema (presionar Enter)" />
    </div>
  `;
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
function escapeAttr(str){
  return (str||'').replace(/"/g,'&quot;');
}

function attachDisciplineEvents(id){
  const st = state.data[id];

  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.addEventListener('click', ()=> navigate(el.dataset.nav));
  });

  const searchInput = document.getElementById('searchInput');
  searchInput.addEventListener('input', (e)=>{
    state.search = e.target.value;
    render();
    setTimeout(()=>{
      const si = document.getElementById('searchInput');
      if(si){ si.focus(); si.selectionStart = si.selectionEnd = si.value.length; }
    },0);
  });

  document.getElementById('resetBtn').addEventListener('click', ()=>{
    if(confirm('¿Restaurar esta disciplina a los subtemas sugeridos originales? Se perderá tu progreso y tus cambios en esta disciplina.')){
      const meta = DEFAULT_DATA.find(d=>d.id===id);
      state.data[id] = cloneDefault(meta);
      scheduleSave(id);
      render();
    }
  });

  document.querySelectorAll('[data-toggle]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      if(e.target.closest('[data-topictext]') || e.target.closest('[data-topicdel]')) return;
      const tid = el.dataset.toggle;
      state.openTopics[tid] = !state.openTopics[tid];
      render();
    });
  });

  document.querySelectorAll('[data-check]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const sid = el.dataset.check;
      const topic = st.topics.find(t=>t.subs.some(s=>s.id===sid));
      const sub = topic.subs.find(s=>s.id===sid);
      sub.done = !sub.done;
      scheduleSave(id);
      render();
    });
  });

  document.querySelectorAll('[data-text]').forEach(el=>{
    el.addEventListener('blur', ()=>{
      const sid = el.dataset.text;
      const topic = st.topics.find(t=>t.subs.some(s=>s.id===sid));
      const sub = topic.subs.find(s=>s.id===sid);
      const val = el.textContent.trim();
      if(val==='' ){
        el.textContent = sub.text; // no permitir vaciar por accidente
        return;
      }
      if(val !== sub.text){ sub.text = val; scheduleSave(id); }
    });
    el.addEventListener('keydown', (e)=>{
      if(e.key==='Enter'){ e.preventDefault(); el.blur(); }
    });
  });

  document.querySelectorAll('[data-topictext]').forEach(el=>{
    el.addEventListener('click', (e)=> e.stopPropagation());
    el.addEventListener('blur', ()=>{
      const tid = el.dataset.topictext;
      const topic = st.topics.find(t=>t.id===tid);
      const val = el.textContent.trim();
      if(val==='' ){ el.textContent = topic.title; return; }
      if(val !== topic.title){ topic.title = val; scheduleSave(id); }
    });
    el.addEventListener('keydown', (e)=>{
      if(e.key==='Enter'){ e.preventDefault(); el.blur(); }
    });
  });

  document.querySelectorAll('[data-subdel]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      e.stopPropagation();
      const sid = el.dataset.subdel;
      const topic = st.topics.find(t=>t.subs.some(s=>s.id===sid));
      topic.subs = topic.subs.filter(s=>s.id!==sid);
      scheduleSave(id);
      render();
    });
  });

  document.querySelectorAll('[data-topicdel]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      e.stopPropagation();
      const tid = el.dataset.topicdel;
      if(confirm('¿Eliminar este tema completo, con todos sus subtemas?')){
        st.topics = st.topics.filter(t=>t.id!==tid);
        scheduleSave(id);
        render();
      }
    });
  });

  document.querySelectorAll('[data-addsub]').forEach(el=>{
    el.addEventListener('keydown', (e)=>{
      if(e.key==='Enter'){
        e.preventDefault();
        const val = el.value.trim();
        if(!val) return;
        const tid = el.dataset.addsub;
        const topic = st.topics.find(t=>t.id===tid);
        topic.subs.push({ id: uid(tid+'-s'), text: val, done:false });
        state.openTopics[tid] = true;
        scheduleSave(id);
        render();
      }
    });
  });

  const addTopicInput = document.getElementById('addTopicInput');
  addTopicInput.addEventListener('keydown', (e)=>{
    if(e.key==='Enter'){
      e.preventDefault();
      const val = addTopicInput.value.trim();
      if(!val) return;
      const newId = uid(id+'-t');
      st.topics.push({ id:newId, title: val, subs: [] });
      state.openTopics[newId] = true;
      scheduleSave(id);
      render();
    }
  });
}

(async function init(){
  renderRail();
  await render();
})();
</script>
</body>
</html>
